      /* Hamburger button - mobilde görünür */
      .home-header .menu-toggle {
        display: none !important;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        width: 32px;
        height: 32px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;

      .menu-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        background: #ccc;
        border-radius: 2px;
        transition: transform 0.3s, opacity 0.3s;
      }
      /* X animasyonu (açıkken) */
      .menu-toggle.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .menu-toggle.open span:nth-child(2) {

      .menu-toggle.open span:nth-child(3) {

    <!-- ===== Header Nav ===== -->
    <header class="home-header" id="homeHeader">
      <div class="nav-inner">
        <a href="/" class="logo-link">
          <img src="/logo-v2-cropped.png" alt="Salise Ligi" width="26" height="26" />
          Salise Ligi
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
        <nav id="mainNav">
          <a href="/" class="active" data-nav="home">Home</a>
          <a href="/how-to-play/" data-nav="howToPlay">How to Play</a>
          <a href="/privacy/" data-nav="privacy">Privacy</a>
          <a href="/contact/" data-nav="contact">Contact</a>
        </nav>
      </div>
    </header>
    <script>
      (function(){
        var btn=document.getElementById('menuToggle');
        var nav=document.getElementById('mainNav');
        btn.addEventListener('click',function(){
          btn.classList.toggle('open');
          nav.classList.toggle('open');
        });
        // Menü linkine tıklayınca kapat
        nav.querySelectorAll('a').forEach(function(a){
          a.addEventListener('click',function(){
            btn.classList.remove('open');
            nav.classList.remove('open');
          });
        });

        // Navigasyon menüsünü dil değişikliğine göre güncelle
        var NAV_TRANSLATIONS = {
          tr: { home: 'Ana Sayfa', howToPlay: 'Nasıl Oynanır', privacy: 'Gizlilik', contact: 'İletişim' },
          en: { home: 'Home', howToPlay: 'How to Play', privacy: 'Privacy', contact: 'Contact' },
          de: { home: 'Startseite', howToPlay: 'Spielanleitung', privacy: 'Datenschutz', contact: 'Kontakt' },
          es: { home: 'Inicio', howToPlay: 'Cómo jugar', privacy: 'Privacidad', contact: 'Contacto' },
          ar: { home: 'الرئيسية', howToPlay: 'طريقة اللعب', privacy: 'الخصوصية', contact: 'اتصل بنا' }
        };
        function updateNavLang(lang) {
          var t = NAV_TRANSLATIONS[lang] || NAV_TRANSLATIONS['en'];
          var links = nav.querySelectorAll('a[data-nav]');
          links.forEach(function(a) {
            var key = a.getAttribute('data-nav');
            if (key === 'home') a.textContent = t.home;
            else if (key === 'howToPlay') a.textContent = t.howToPlay;
            else if (key === 'privacy') a.textContent = t.privacy;
            else if (key === 'contact') a.textContent = t.contact;
          });
        }
        // Sayfa yüklendiğinde localStorage'dan dili oku
        var savedLang = null;
        try { savedLang = localStorage.getItem('saliseligi-lang'); } catch(e) {}
        if (savedLang) updateNavLang(savedLang);

        // Playground'dan gelen dil değişikliği event'ini dinle
        window.addEventListener('saliseligi-lang-change', function(e) {
          updateNavLang(e.detail.lang);
        });
      })();
    </script>
